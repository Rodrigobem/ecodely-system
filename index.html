<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecodely — Sistema de Gestao</title>
    <meta name="description" content="Sistema de gestao Ecodely — Midia In-Home" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #06070D; }
      #root { height: 100vh; }

      /* ── RESPONSIVIDADE MOBILE ── */
      @media (max-width: 768px) {
        /* Hamburger visível */
        .hamburger { display: flex !important; }

        /* Overlay visível quando menu aberto */
        .mob-overlay { display: block !important; }

        /* Sidebar oculta por padrão, abre com classe */
        .sidebar {
          position: fixed !important;
          left: -220px !important;
          top: 0 !important;
          height: 100vh !important;
          z-index: 300 !important;
          transition: left 0.25s ease !important;
          width: 210px !important;
        }
        .sidebar-open {
          position: fixed !important;
          left: 0 !important;
          top: 0 !important;
          height: 100vh !important;
          z-index: 300 !important;
          width: 210px !important;
          transition: left 0.25s ease !important;
        }

        /* Conteúdo ocupa tela toda */
        #root > div > div:last-child {
          width: 100% !important;
          padding: 0 !important;
        }

        /* Padding reduzido no conteúdo */
        .content-pad {
          padding: 12px !important;
        }

        /* Grids adaptam para 1 coluna */
        [style*="grid-template-columns: repeat(4"] {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        [style*="gridTemplateColumns:\"repeat(4"] {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        [style*="grid-template-columns: repeat(3"] {
          grid-template-columns: repeat(2, 1fr) !important;
        }

        /* Tabela do fluxo — scroll horizontal */
        .fluxo-table-wrap {
          overflow-x: auto !important;
          -webkit-overflow-scrolling: touch !important;
        }

        /* Modais full screen no mobile */
        [style*="maxWidth:560"], [style*="max-width: 560"],
        [style*="maxWidth:680"], [style*="max-width: 680"] {
          width: 100% !important;
          max-width: 100% !important;
          margin: 0 !important;
          border-radius: 12px 12px 0 0 !important;
          position: fixed !important;
          bottom: 0 !important;
          left: 0 !important;
        }

        /* Kanban — scroll horizontal */
        .kanban-board {
          overflow-x: auto !important;
          -webkit-overflow-scrolling: touch !important;
        }
      }

      @media (max-width: 480px) {
        [style*="grid-template-columns: repeat(2"] {
          grid-template-columns: 1fr !important;
        }
        [style*="gridTemplateColumns:\"repeat(2"] {
          grid-template-columns: 1fr !important;
        }
        [style*="gridTemplateColumns:\"1fr 1fr\""] {
          grid-template-columns: 1fr !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
